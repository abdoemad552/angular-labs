@if (product(); as p) {
  <div class="max-w-4xl mx-auto px-4 py-8">

    <a routerLink="/" class="text-sm text-gray-500 hover:text-gray-800 flex items-center gap-1 mb-6">
      ← Back to products
    </a>

    <div class="bg-white border border-gray-200">

      <div class="grid grid-cols-1 md:grid-cols-2">

        <div class="border-b md:border-b-0 md:border-r border-gray-200">
          <img [src]="p.images[0]" class="w-full h-72 md:h-full object-cover" />
        </div>

        <div class="p-6 flex flex-col gap-4">

          <div>
            <h1 class="text-lg font-bold text-gray-900">{{ p.title }}</h1>
          </div>

          <div class="flex items-baseline gap-2">
            <span class="text-xl font-bold text-gray-900">
              {{ discountedPrice() | currency }}
            </span>
            @if (p.discountPercentage) {
              <span class="text-sm text-gray-400 line-through">
                {{ p.price | currency }}
              </span>
              <span class="text-sm text-red-500 font-medium">
                -{{ p.discountPercentage }}%
              </span>
            }
          </div>

          <div class="border-t border-gray-100 pt-4">
            <p class="text-xs text-gray-500 uppercase font-semibold mb-1 tracking-wide">
              Description
            </p>
            <p class="text-sm text-gray-700 leading-relaxed">
              {{ p.description }}
            </p>
          </div>

          <div class="border-t border-gray-100 pt-4">
            <p class="text-xs text-gray-500 uppercase font-semibold mb-2 tracking-wide">
              Quantity
            </p>
            <div class="flex items-center gap-3">
              <button
                class="w-8 h-8 border border-gray-300 text-gray-600 flex items-center justify-center hover:bg-gray-100 text-sm"
                (click)="decrement()">−</button>
              <span class="text-sm font-semibold w-4 text-center">{{ quantity() }}</span>
              <button
                class="w-8 h-8 border border-gray-300 text-gray-600 flex items-center justify-center hover:bg-gray-100 text-sm"
                (click)="increment()">+</button>
            </div>
          </div>

          <div class="border-t border-gray-100 pt-4 mt-auto flex items-center justify-between">
            <div>
              <p class="text-xs text-gray-400">Total</p>
              <p class="text-base font-bold text-gray-900">{{ totalPrice() | currency }}</p>
            </div>
            <button class="px-6 py-2 bg-gray-900 text-white text-sm hover:bg-gray-700">
              Add to Cart
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>
}
