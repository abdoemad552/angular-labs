<div class="min-h-screen bg-gray-50 flex flex-col">
  <app-header/>

  <div class="flex-1 relative">

    @if (isLoading()) {
      <div class="flex items-center justify-center py-24">
        <p class="text-sm text-gray-400">Loading...</p>
      </div>
    }

    <div [ngClass]="{'hidden': isLoading()}">
      <router-outlet />
    </div>

  </div>

  <app-footer/>
</div>
